# Producción: corre la imagen ya construida y publicada en GHCR por el workflow
# de GitHub Actions. NO construye en la VPS.
#
# La variable WEB_IMAGE la setea el deploy (ej:
#   ghcr.io/juanlopezasis27/nutricionista:latest)
# Para un arranque manual en la VPS:
#   WEB_IMAGE=ghcr.io/juanlopezasis27/nutricionista:latest \
#     docker compose -f docker-compose.prod.yml up -d

services:
  web:
    image: ${WEB_IMAGE:-ghcr.io/juanlopezasis27/nutricionista:latest}
    container_name: nutricionista-web
    restart: unless-stopped
    # Solo localhost: Nginx (host) hace de reverse proxy hacia este puerto.
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
